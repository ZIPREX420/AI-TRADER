name: nightly-research

# Scheduled research pass: backfill the previous day's on-chain swaps into
# the parquet research dataset, then run the walk-forward evaluation over the
# accumulated history. Results are uploaded as artifacts for offline review.
#
# Requires the `SOLALPHA_RPC_URLS` repository secret (comma-separated mainnet
# RPC endpoints). If it is unset the job no-ops cleanly rather than failing,
# so forks and fresh clones stay green.

on:
  schedule:
    # 04:30 UTC daily -- after the previous UTC day has fully closed.
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      since:
        description: "Backfill start (ISO date, e.g. 2026-05-23). Default: yesterday."
        required: false
        type: string

concurrency:
  group: nightly-research
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  research:
    name: backfill + walk-forward
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SOLALPHA_PROFILE: research
      SOLALPHA_RPC_URLS: ${{ secrets.SOLALPHA_RPC_URLS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check RPC secret is configured
        id: guard
        run: |
          if [ -z "${SOLALPHA_RPC_URLS}" ]; then
            echo "::warning::SOLALPHA_RPC_URLS secret is not set -- skipping research run"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        if: steps.guard.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Resolve backfill window
        if: steps.guard.outputs.configured == 'true'
        id: window
        run: |
          since="${{ inputs.since }}"
          if [ -z "$since" ]; then
            since="$(date -u -d 'yesterday' +%Y-%m-%d)"
          fi
          echo "since=$since" >> "$GITHUB_OUTPUT"
          echo "Backfilling from $since"

      - name: Research backfill
        if: steps.guard.outputs.configured == 'true'
        run: solalpha research backfill --since "${{ steps.window.outputs.since }}"

      - name: Walk-forward evaluation
        if: steps.guard.outputs.configured == 'true'
        run: solalpha research walkforward | tee walkforward-report.json

      - name: Upload research artifacts
        if: steps.guard.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-research-${{ steps.window.outputs.since }}
          path: |
            walkforward-report.json
            data/parquet
            data/snapshots
          if-no-files-found: warn
          retention-days: 30
